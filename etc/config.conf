#!/bin/bash
# ============================================================
# Linux 系统运维工具箱 — 全局配置文件
# ============================================================

# --- 告警阈值 ---
CPU_THRESHOLD=80
MEM_THRESHOLD=80
DISK_THRESHOLD=90
SWAP_THRESHOLD=50

# --- 扫描参数 ---
LARGE_FILE_SIZE="+100M"
OLD_FILE_MTIME="+30"

# --- 日志参数 ---
LOG_RETENTION_DAYS=7

# --- 监控参数 ---
TOP_N_PROCS=5

# --- 守护进程 ---
DAEMON_INTERVAL=300

# --- 暴力破解检测 ---
BRUTE_FORCE_WINDOW=300
BRUTE_FORCE_THRESHOLD=5

# --- 守护进程 ---
PID_FILE="./logs/sysops_daemon.pid"

# --- 颜色定义 (ANSI) ---
COLOR_RED=$'\033[0;31m'
COLOR_GREEN=$'\033[0;32m'
COLOR_YELLOW=$'\033[1;33m'
COLOR_BLUE=$'\033[0;34m'
COLOR_CYAN=$'\033[0;36m'
COLOR_BOLD=$'\033[1m'
COLOR_RESET=$'\033[0m'
COLOR_BG_RED=$'\033[41m'
